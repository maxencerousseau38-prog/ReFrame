<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink: #16140f; --paper: #f5f3ee; --muted: #6f6b62;
    --beige-light: #ece9e1; --beige: #ddd7c9; --beige-dark: #c4bdab; --line: rgba(22,20,15,.10);
  }
  * { margin: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1080px; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--paper); color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  .ad { position: relative; width: 1080px; height: 1080px; padding: 76px; display: flex; flex-direction: column; overflow: hidden; }
  .halo { position: absolute; border-radius: 999px; filter: blur(60px); pointer-events: none; }
  .h1 { top: -240px; left: 50%; transform: translateX(-50%); width: 900px; height: 520px; background: radial-gradient(closest-side, rgba(196,189,171,.55), transparent); }
  .h2 { right: -120px; bottom: -80px; width: 460px; height: 460px; background: radial-gradient(closest-side, rgba(160,150,130,.40), transparent); }
  .logo { display: flex; align-items: center; gap: 14px; font-weight: 600; font-size: 30px; letter-spacing: -.03em; z-index: 2; }
  .mark { width: 46px; height: 46px; border-radius: 12px; background: var(--ink); color: var(--paper); display: grid; place-items: center; }
  .eyebrow { display: inline-flex; align-items: center; gap: 10px; align-self: flex-start; margin-top: 64px; padding: 10px 18px; border: 1px solid var(--line); border-radius: 999px; background: rgba(255,255,255,.6); font-size: 20px; color: var(--muted); z-index: 2; }
  .dot { width: 9px; height: 9px; border-radius: 999px; background: var(--ink); }
  h1 { margin-top: 28px; font-size: 78px; line-height: 1.02; letter-spacing: -.04em; font-weight: 600; z-index: 2; }
  .grad { background: linear-gradient(100deg, #16140f 0%, #5c554a 55%, #9a9082 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .sub { margin-top: 24px; font-size: 26px; line-height: 1.45; color: var(--muted); max-width: 760px; z-index: 2; }

  .window { margin-top: auto; border-radius: 22px; background: #fff; border: 1px solid var(--line); box-shadow: 0 1px 1px rgba(0,0,0,.02), 0 30px 70px -28px rgba(10,10,40,.28); overflow: hidden; z-index: 2; }
  .winbar { display: flex; align-items: center; gap: 9px; padding: 16px 20px; border-bottom: 1px solid var(--line); }
  .tl { width: 13px; height: 13px; border-radius: 999px; }
  .url { margin-left: 18px; flex: 1; height: 26px; border-radius: 8px; background: var(--paper); }
  .winbody { padding: 24px; display: flex; gap: 16px; }
  .kpi { flex: 1; border: 1px solid var(--line); border-radius: 14px; padding: 16px 18px; background: var(--paper); }
  .kpi .k { font-size: 17px; color: var(--muted); }
  .kpi .v { margin-top: 6px; font-size: 32px; font-weight: 600; letter-spacing: -.02em; }
  .bars { display: flex; align-items: flex-end; gap: 8px; height: 96px; padding: 0 24px 24px; }
  .bars span { flex: 1; border-radius: 6px 6px 0 0; background: linear-gradient(to top, var(--beige-dark), var(--ink)); }

  .footer { margin-top: 40px; display: flex; align-items: center; gap: 24px; z-index: 2; }
  .cta { display: inline-flex; align-items: center; gap: 12px; background: var(--ink); color: var(--paper); font-weight: 500; font-size: 26px; padding: 22px 34px; border-radius: 999px; }
  .reassure { font-size: 20px; color: var(--muted); }
</style>
</head>
<body>
  <div class="ad">
    <div class="halo h1"></div>
    <div class="halo h2"></div>

    <div class="logo">
      <span class="mark">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none"><path d="M3 13.5 5 7h14l2 6.5M5.5 17.5h.01M18.5 17.5h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 13.5h18v3a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1v-3Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
      </span>
      DriveOS
    </div>

    <span class="eyebrow"><span class="dot"></span> Plateforme de vente automobile</span>
    <h1>Toutes vos ventes auto,<br><span class="grad">au même endroit.</span></h1>
    <p class="sub">CRM, stock, agenda, relances et IA — pensé pour les garages, concessions et mandataires.</p>

    <div class="window">
      <div class="winbar"><span class="tl" style="background:#ff5f57"></span><span class="tl" style="background:#febc2e"></span><span class="tl" style="background:#28c840"></span><div class="url"></div></div>
      <div class="winbody">
        <div class="kpi"><div class="k">Véhicules</div><div class="v">248</div></div>
        <div class="kpi"><div class="k">Leads / mois</div><div class="v">1 320</div></div>
        <div class="kpi"><div class="k">Conversion</div><div class="v">24,8 %</div></div>
      </div>
      <div class="bars"><span style="height:42%"></span><span style="height:58%"></span><span style="height:48%"></span><span style="height:72%"></span><span style="height:62%"></span><span style="height:84%"></span><span style="height:74%"></span><span style="height:96%"></span></div>
    </div>

    <div class="footer">
      <span class="cta">Démarrer gratuitement →</span>
      <span class="reassure">7 jours gratuits · sans carte bancaire</span>
    </div>
  </div>
</body>
</html>
