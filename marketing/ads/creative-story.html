<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root { --ink:#16140f; --paper:#f5f3ee; --muted:#6f6b62; --beige-light:#ece9e1; --beige:#ddd7c9; --beige-dark:#c4bdab; --line:rgba(22,20,15,.10); }
  * { margin:0; box-sizing:border-box; }
  html, body { width:1080px; height:1920px; }
  body { font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:var(--paper); color:var(--ink); -webkit-font-smoothing:antialiased; }
  .ad { position:relative; width:1080px; height:1920px; padding:96px 84px; display:flex; flex-direction:column; overflow:hidden; }
  .halo { position:absolute; border-radius:999px; filter:blur(70px); pointer-events:none; }
  .h1 { top:-260px; left:50%; transform:translateX(-50%); width:1000px; height:600px; background:radial-gradient(closest-side, rgba(196,189,171,.55), transparent); }
  .h2 { right:-160px; bottom:120px; width:560px; height:560px; background:radial-gradient(closest-side, rgba(160,150,130,.38), transparent); }
  .logo { display:flex; align-items:center; gap:16px; font-weight:600; font-size:34px; letter-spacing:-.03em; z-index:2; }
  .mark { width:52px; height:52px; border-radius:14px; background:var(--ink); color:var(--paper); display:grid; place-items:center; }
  h1 { margin-top:80px; font-size:104px; line-height:1.0; letter-spacing:-.045em; font-weight:600; z-index:2; }
  .grad { background:linear-gradient(100deg,#16140f 0%,#5c554a 55%,#9a9082 100%); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .sub { margin-top:36px; font-size:34px; line-height:1.4; color:var(--muted); max-width:820px; z-index:2; }
  ul { list-style:none; margin-top:56px; display:flex; flex-direction:column; gap:26px; z-index:2; }
  li { display:flex; align-items:center; gap:20px; font-size:36px; font-weight:500; }
  .chk { width:46px; height:46px; border-radius:12px; background:var(--ink); color:var(--paper); display:grid; place-items:center; flex:none; }

  .window { margin-top:64px; border-radius:26px; background:#fff; border:1px solid var(--line); box-shadow:0 30px 80px -28px rgba(10,10,40,.28); overflow:hidden; z-index:2; }
  .winbar { display:flex; align-items:center; gap:11px; padding:20px 24px; border-bottom:1px solid var(--line); }
  .tl { width:15px; height:15px; border-radius:999px; }
  .url { margin-left:20px; flex:1; height:30px; border-radius:8px; background:var(--paper); }
  .bars { display:flex; align-items:flex-end; gap:12px; height:200px; padding:32px; }
  .bars span { flex:1; border-radius:8px 8px 0 0; background:linear-gradient(to top, var(--beige-dark), var(--ink)); }

  .footer { margin-top:auto; display:flex; flex-direction:column; gap:24px; align-items:flex-start; z-index:2; }
  .cta { display:inline-flex; align-items:center; gap:14px; background:var(--ink); color:var(--paper); font-weight:600; font-size:38px; padding:30px 48px; border-radius:999px; }
  .reassure { font-size:28px; color:var(--muted); }
</style>
</head>
<body>
  <div class="ad">
    <div class="halo h1"></div>
    <div class="halo h2"></div>

    <div class="logo">
      <span class="mark"><svg width="30" height="30" viewBox="0 0 24 24" fill="none"><path d="M3 13.5 5 7h14l2 6.5M5.5 17.5h.01M18.5 17.5h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 13.5h18v3a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1v-3Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg></span>
      DriveOS
    </div>

    <h1>Fini Excel.<br><span class="grad">Fini les relances<br>oubliées.</span></h1>
    <p class="sub">DriveOS centralise vos prospects, votre stock et vos relances. L'IA s'occupe du reste.</p>

    <ul>
      <li><span class="chk"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 4.5 4.5L19 7"/></svg></span> CRM &amp; suivi des prospects</li>
      <li><span class="chk"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 4.5 4.5L19 7"/></svg></span> Gestion du stock véhicules</li>
      <li><span class="chk"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 4.5 4.5L19 7"/></svg></span> Relances email &amp; SMS par IA</li>
    </ul>

    <div class="window">
      <div class="winbar"><span class="tl" style="background:#ff5f57"></span><span class="tl" style="background:#febc2e"></span><span class="tl" style="background:#28c840"></span><div class="url"></div></div>
      <div class="bars"><span style="height:40%"></span><span style="height:56%"></span><span style="height:46%"></span><span style="height:70%"></span><span style="height:60%"></span><span style="height:82%"></span><span style="height:72%"></span><span style="height:95%"></span></div>
    </div>

    <div class="footer">
      <span class="cta">Démarrer gratuitement →</span>
      <span class="reassure">7 jours gratuits · sans carte bancaire</span>
    </div>
  </div>
</body>
</html>
