<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Atelier Lumière — Menuiserie d'art</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* inline block on purpose: capture must collect it as via:"inline" */
    .badge { border-radius: 9999px; padding: 4px 12px; }
  </style>
</head>
<body>
  <header>
    <nav>
      <a href="#atelier">Atelier</a>
      <a href="#realisations">Réalisations</a>
      <a href="#contact" class="badge">Devis</a>
    </nav>
  </header>

  <section id="hero">
    <h1>Menuiserie d'art à Grenoble</h1>
    <p>Pièces uniques en bois massif, dessinées et fabriquées à la main depuis 1987.</p>
    <a href="#contact" class="cta">Discuter de votre projet</a>
    <img src="workshop.svg" alt="L'atelier" width="640" height="360">
  </section>

  <section id="realisations">
    <h2>Réalisations récentes</h2>
    <img src="workshop.svg" alt="Bibliothèque sur mesure" width="320" height="180" loading="lazy">
    <img src="workshop.svg" alt="Escalier hélicoïdal" width="320" height="180" loading="lazy">
  </section>

  <section id="contact">
    <h2>Contact</h2>
    <p>04 76 00 00 00 — atelier@lumiere.example</p>
    <button type="button">Demander un devis</button>
  </section>

  <footer>
    <p>© Atelier Lumière</p>
  </footer>
</body>
</html>
